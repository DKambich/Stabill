name: stabill
description: A Flutter project to serve a cloud based checkbook

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  auto_size_text: ^3.0.0-nullsafety.0
  cloud_firestore: "^2.5.3"
  file_picker: ^4.0.3
  firebase_auth: "^3.1.3"
  firebase_core: "^1.7.0"
  flutter:
    sdk: flutter
  flutter_native_splash: ^1.2.4
  flutter_speed_dial: ^4.1.0
  lint: ^1.7.2
  provider: ^6.0.0
  responsive_builder: ^0.4.1
  shared_preferences: ^2.0.8
  substring_highlight: ^1.0.33

dev_dependencies:
  flutter_launcher_icons: "^0.9.2"
  flutter_test:
    sdk: flutter

flutter_native_splash:
  color: "#4caf50"
  image: assets/icon/logo_original_512.png
  color_dark: "#303030"
  fullscreen: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path_android: "assets/icon/logo_android.png"
  image_path_ios: "assets/icon/logo_ios.png"

flutter:
  assets:
    - assets/icon/logo.png
  uses-material-design: true
